name: Build Windows exe

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write  # necessário para criar a release e anexar o .exe

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Rodar testes (sem GUI)
        run: python -m pytest tests/ -q

      - name: Compilar FontFinder.exe
        run: pyinstaller FontFinder.spec

      - name: Publicar artifact
        uses: actions/upload-artifact@v4
        with:
          name: FontFinder-windows
          path: dist/FontFinder.exe

      - name: Anexar à release (tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FontFinder.exe
